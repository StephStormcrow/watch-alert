<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        /* Massive, single-tap responsive button */
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 210px;
            height: 210px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            text-align: center;
            line-height: 1.4;
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Back to a single seamless tap experience -->
        <button id="actionBtn" class="panic-btn" onclick="triggerAndroidAlert()">⚠️<br><br>SEND<br>ASSISTANCE</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerAndroidAlert() {
            const btn = document.getElementById('actionBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (pos) => { handleHandoff(pos.coords.latitude, pos.coords.longitude); },
                (err) => {
                    // Cell-tower backup location check running within 4 seconds if satellite sync struggles
                    navigator.geolocation.getCurrentPosition(
                        (fallbackPos) => { handleHandoff(fallbackPos.coords.latitude, fallbackPos.coords.longitude); },
                        (fallbackErr) => {
                            btn.disabled = false;
                            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                            alert("GPS Fail: Ensure browser location permissions are enabled.");
                        },
                        { enableHighAccuracy: false, timeout: 4000 }
                    );
                },
                { enableHighAccuracy: true, timeout: 4000 }
            );
        }

        function handleHandoff(lat, lon) {
            const btn = document.getElementById('actionBtn');
            
            // Decimal formatting yields ~1 meter precision and keeps text clean
            const cleanLat = lat.toFixed(5);
            const cleanLon = lon.toFixed(5);
            
            // Standard query-less template format that Android systems recognize natively
            const mapLink = "https://google.com" + cleanLat + "," + cleanLon;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-ZA'); 
            const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

            // Using explicit line break operators groups the text elements cleanly
            const structuralText = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}.\n\nLast known location:\n${mapLink}`;
            
            // ⚠️ THE ANDROID FIX: Triggers the phone's native Share Intent overlay.
            // This stops web browser routing loops from crashing.
            if (navigator.share) {
                navigator.share({
                    text: structuralText
                })
                .then(() => {
                    btn.disabled = false;
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                })
                .catch((err) => {
                    btn.disabled = false;
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                });
            } else {
                // Fallback option using standard web routing if opened outside a mobile environment
                window.location.replace("https://wa.me/?text=" + encodeURIComponent(structuralText));
                btn.disabled = false;
                btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
            }
        }
    </script>

</body>
</html>
