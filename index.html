<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <button id="actionBtn" class="panic-btn" onclick="triggerDirectPanic()">⚠️<br><br>SEND<br>ASSISTANCE</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        // ⚠️ REMEMBER: Put your exact target control room phone number here
        const targetPhone = "27821234567"; 

        function triggerDirectPanic() {
            const btn = document.getElementById('actionBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is disabled or unsupported.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // FIXED FORMAT: maps.google.com ensures a clickable text link on mobile
                    const mapLink = `https://google.com{lat},${lon}`;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); 
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    
                    // encodeURIComponent transforms links safely so WhatsApp reads it as clean text string
                    const textMessage = encodeURIComponent(rawMessage);
                    
                    // Direct Deep Link routing
                    const deepLink = `whatsapp://send?phone=${targetPhone}&text=${textMessage}`;
                    
                    window.location.href = deepLink;

                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    }, 2000);
                },
                (error) => {
                    btn.disabled = false;
                    btn.innerHTML = "⚠️<br><br>TRY AGAIN";
                    alert("GPS Signal dropped. Check browser app position access permissions.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }
    </script>

</body>
</html>
