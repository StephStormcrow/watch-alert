<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Single Button Setup -->
        <button id="actionBtn" class="panic-btn" onclick="triggerPatrolAlert()">⚠️<br><br>SEND<br>ASSISTANCE</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerPatrolAlert() {
            const btn = document.getElementById('actionBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is disabled or unsupported.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://google.com{lat},${lon}`;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); 
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    const fullMessageText = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    
                    // NATIVE APP FLOW: Use Web Share API instead of explicit links
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                text: fullMessageText
                            });
                            // Reset button text after successful handover
                            btn.disabled = false;
                            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                        } catch (err) {
                            // If they cancel out of the sharing drawer menu, reset the display
                            btn.disabled = false;
                            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                        }
                    } else {
                        // Fallback option just in case a laptop browser is used
                        window.open(`https://whatsapp.com{encodeURIComponent(fullMessageText)}`, '_blank');
                        btn.disabled = false;
                        btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    }
                },
                (error) => {
                    btn.disabled = false;
                    btn.innerHTML = "⚠️<br><br>TRY AGAIN";
                    alert("GPS fail. Ensure location settings are active.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }
    </script>

</body>
</html>
