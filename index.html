<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            text-align: center;
            line-height: 1.4;
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <button id="actionBtn" class="panic-btn" onclick="triggerPatrolPanic()">⚠️<br><br>SEND<br>ASSISTANCE</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerPatrolPanic() {
            const btn = document.getElementById('actionBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (pos) => { executeHandoff(pos.coords.latitude, pos.coords.longitude); },
                (err) => {
                    navigator.geolocation.getCurrentPosition(
                        (fallbackPos) => { executeHandoff(fallbackPos.coords.latitude, fallbackPos.coords.longitude); },
                        (fallbackErr) => {
                            btn.disabled = false;
                            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                            alert("Location Error: Verify browser permissions.");
                        },
                        { enableHighAccuracy: false, timeout: 4000 }
                    );
                },
                { enableHighAccuracy: true, timeout: 4000 }
            );
        }

        function executeHandoff(lat, lon) {
            const btn = document.getElementById('actionBtn');
            
            // Standardizes values to 5 decimal spaces to stay within iOS character safety parameters
            const cleanLat = lat.toFixed(5);
            const cleanLon = lon.toFixed(5);
            
            // NATIVE LAYOUT OVERRIDE: Placing ://google.com on its own independent line 
            // keeps characters intact without formatting breakage inside WhatsApp on iPhones.
            const mapLink = "https://://google.com" + cleanLat + "," + cleanLon;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-ZA'); 
            const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

            // Placing the map URL on its own line isolated from surrounding words is key
            const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}.\n\nLast known location:\n${mapLink}`;
            
            const targetUrl = "https://wa.me/?text=" + encodeURIComponent(rawMessage);
            
            window.location.replace(targetUrl);

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
            }, 3000);
        }
    </script>

</body>
</html>
