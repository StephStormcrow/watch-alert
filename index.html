<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            border: none;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <a href="#" id="actionBtn" class="panic-btn" onclick="triggerGroupPanic(event)">⚠️<br><br>SEND<br>ASSISTANCE</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerGroupPanic(event) {
            const btn = document.getElementById('actionBtn');
            event.preventDefault(); 

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            btn.innerHTML = "🔄<br><br>LOCKING GPS...";
            btn.style.pointerEvents = "none";

            // Try to get a high-accuracy GPS lock first
            navigator.geolocation.getCurrentPosition(
                (pos) => { sendToWhatsApp(pos.coords.latitude, pos.coords.longitude); },
                (err) => {
                    // FALLBACK: If GPS fails or takes too long, try cell-tower location instantly
                    console.log("High accuracy failed, trying fallback...");
                    navigator.geolocation.getCurrentPosition(
                        (fallbackPos) => { sendToWhatsApp(fallbackPos.coords.latitude, fallbackPos.coords.longitude); },
                        (fallbackErr) => {
                            btn.style.pointerEvents = "auto";
                            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                            alert("Location Error: Please check your phone settings and ensure Location/GPS is enabled for your browser app.");
                        },
                        { enableHighAccuracy: false, timeout: 5000 }
                    );
                },
                { enableHighAccuracy: true, timeout: 4000 } // Give GPS 4 seconds before failing over
            );
        }

        function sendToWhatsApp(lat, lon) {
            const btn = document.getElementById('actionBtn');
            const mapLink = `https://google.com{lat},${lon}`;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-ZA'); 
            const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

            const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
            const textMessage = encodeURIComponent(rawMessage);
            
            btn.href = `https://wa.me{textMessage}`;
            btn.style.pointerEvents = "auto";
            btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
            
            btn.click(); // Fire the link
        }
    </script>

</body>
</html>
