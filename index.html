<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            background-color: #d32f2f; /* Red initially */
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            transition: all 0.3s ease;
        }
        /* Style adjustments when ready to launch WhatsApp */
        .panic-btn.ready {
            background-color: #25D366 !important; /* WhatsApp Green */
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8) !important;
            color: white !important;
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Unified state machine button -->
        <button class="panic-btn" id="actionBtn" onclick="handleButtonClick()">⚠️<br><br>1. GET LOCATION</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        // Track internal state shifts
        let currentStatus = "idle"; 
        let generatedWhatsappUrl = "";

        function handleButtonClick() {
            const btn = document.getElementById('actionBtn');

            // STATE 1: Initial Click - Fetch the GPS variables
            if (currentStatus === "idle") {
                if (!navigator.geolocation) {
                    alert("Error: Geolocation is disabled or unsupported.");
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = "🔄<br><br>LOCKING GPS...";

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const mapLink = `https://google.com{lat},${lon}`;
                        
                        const now = new Date();
                        const dateStr = now.toLocaleDateString('en-ZA'); 
                        const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                        const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                        const textMessage = encodeURIComponent(rawMessage);
                        
                        // Save the text parameters locally
                        generatedWhatsappUrl = `https://wa.me{textMessage}`;
                        
                        // Progress state immediately to Step 2
                        currentStatus = "ready";
                        btn.disabled = false;
                        btn.classList.add('ready');
                        btn.innerHTML = "💬<br><br>2. SEND TO<br>WHATSAPP";
                    },
                    (error) => {
                        btn.disabled = false;
                        btn.innerHTML = "⚠️<br><br>TRY AGAIN";
                        if (error.code === error.PERMISSION_DENIED) {
                            alert("Please allow location access permissions.");
                        } else {
                            alert("GPS link timed out.");
                        }
                    },
                    { enableHighAccuracy: true, timeout: 7000 }
                );
            } 
            // STATE 2: Location locked - Fire the secure link directly 
            else if (currentStatus === "ready" && generatedWhatsappUrl !== "") {
                window.open(generatedWhatsappUrl, '_blank');
                
                // Reset button state slightly delayed after app handoff 
                setTimeout(() => {
                    currentStatus = "idle";
                    btn.classList.remove('ready');
                    btn.innerHTML = "⚠️<br><br>1. GET LOCATION";
                }, 2000);
            }
        }
    </script>

</body>
</html>
