<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Patrol Alert</title>
<style>
body{font-family:Arial,sans-serif;background:#1a1a1a;color:white;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
.container{text-align:center}
.callsign-display{font-size:24px;color:#ff4d4d;margin-bottom:35px}
.alert-btn{background:#d32f2f;color:white;border:none;width:240px;height:240px;border-radius:50%;font-size:22px;font-weight:bold}
.alert-btn.ready{background:#25D366}
</style>
</head>
<body>
<div class="container">
<div id="memberDisplay" class="callsign-display">Loading...</div>

<button id="gpsBtn" class="alert-btn" onclick="sendEmergency()">
⚠️
<br><br>
SEND
<br>
EMERGENCY
<br>
ALERT
</button>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const callSign=params.get("id")||"Unknown Patrol";

document.getElementById("memberDisplay").innerText=
`Logged: ${callSign}`;

function sendEmergency(){

const btn=document.getElementById("gpsBtn");

btn.disabled=true;

btn.innerHTML=
"📍<br><br>LOCKING<br>GPS";

navigator.geolocation.getCurrentPosition(

(position)=>{

openWhatsApp(
position.coords.latitude,
position.coords.longitude
);

},

(error)=>{

alert("Unable to get location");

resetButton();

},

{
enableHighAccuracy:true,
timeout:8000
}

);

}

async function openWhatsApp(lat,lon){

const btn=document.getElementById("gpsBtn");

btn.classList.add("ready");

btn.innerHTML=
"✅<br><br>OPENING<br>WHATSAPP";

const mapLink=
`https://maps.google.com/?q=${lat.toFixed(5)},${lon.toFixed(5)}`;

const now=new Date();

const message=
`🚨 Assistance required

Call Sign: ${callSign}

Date:
${now.toLocaleDateString("en-ZA")}

Time:
${now.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit"})}

Location:
${mapLink}`;

try{

if(navigator.share){

await navigator.share({
text:message
});

}else{

window.location.href=
`https://wa.me/?text=${encodeURIComponent(message)}`;

}

}catch{

resetButton();

}

}

function resetButton(){

const btn=document.getElementById("gpsBtn");

btn.disabled=false;

btn.classList.remove("ready");

btn.innerHTML=
`⚠️<br><br>SEND<br>EMERGENCY<br>ALERT`;

}

</script>
</body>
</html>
