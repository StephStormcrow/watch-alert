<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        /* Style for our main action button */
        .panic-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            margin-bottom: 20px;
        }
        /* Style for the real, native HTML WhatsApp Link */
        .whatsapp-link {
            display: none; /* Hidden until GPS data locks in */
            align-items: center;
            justify-content: center;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        
        <!-- BUTTON 1: Purely captures the location variables -->
        <button id="gpsBtn" class="panic-btn" onclick="captureLocation()">⚠️<br><br>1. LOCK GPS</button>
        
        <!-- BUTTON 2: A pure HTML link. Mobile browsers will NOT block this click -->
        <a id="waLink" class="whatsapp-link" href="#">💬<br><br>2. SEND TO<br>WHATSAPP</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function captureLocation() {
            const gpsBtn = document.getElementById('gpsBtn');
            const waLink = document.getElementById('waLink');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is disabled or unsupported.");
                return;
            }

            gpsBtn.disabled = true;
            gpsBtn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://google.com{lat},${lon}`;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); 
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    const textMessage = encodeURIComponent(rawMessage);
                    
                    // Inject the string directly into a standard web anchor layout
                    waLink.href = `https://whatsapp.com{textMessage}`;
                    
                    // Hide the first button, show the pure link button
                    gpsBtn.style.display = "none";
                    waLink.style.display = "inline-flex";
                },
                (error) => {
                    gpsBtn.disabled = false;
                    gpsBtn.innerHTML = "⚠️<br><br>TRY AGAIN";
                    alert("GPS Signal failed. Please ensure location services are enabled on your device browser app.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }
    </script>

</body>
</html>
