<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 210px;
            height: 210px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            text-align: center;
            line-height: 1.4;
        }
        .panic-btn:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
        }
        .toast-msg {
            display: none;
            margin-top: 20px;
            background-color: #333;
            color: #25D366;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <button id="actionBtn" class="panic-btn" onclick="triggerPatrolPanic()">⚠️<br><br>TAP TO RUN<br>EMERGENCY ALERT</button>
        <div id="toast" class="toast-msg">📋 LINK COPIED! OPENING WHATSAPP...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerPatrolPanic() {
            const btn = document.getElementById('actionBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (pos) => { copyAndRedirect(pos.coords.latitude, pos.coords.longitude); },
                (err) => {
                    navigator.geolocation.getCurrentPosition(
                        (fallbackPos) => { copyAndRedirect(fallbackPos.coords.latitude, fallbackPos.coords.longitude); },
                        (fallbackErr) => {
                            btn.disabled = false;
                            btn.innerHTML = "⚠️<br><br>TAP TO RUN<br>EMERGENCY ALERT";
                            alert("Location Error: Please ensure browser app location tracking permissions are allowed.");
                        },
                        { enableHighAccuracy: false, timeout: 4000 }
                    );
                },
                { enableHighAccuracy: true, timeout: 4000 }
            );
        }

        function copyAndRedirect(lat, lon) {
            const btn = document.getElementById('actionBtn');
            const toast = document.getElementById('toast');
            
            const cleanLat = lat.toFixed(5);
            const cleanLon = lon.toFixed(5);
            
            // This maps out standard clean query logic that WhatsApp loves to link
            const mapLink = "https://google.com" + cleanLat + "," + cleanLon;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-ZA'); 
            const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

            const structuralMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
            
            // NATIVE MEMORY INJECTION: Copies text directly into the phone's internal clipboard
            // This safely bypasses browser script limitations
            const tempInput = document.createElement("textarea");
            tempInput.value = structuralMessage;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999); // Safe verification check for mobile architectures
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            // Trigger visual feedback notice
            toast.style.display = "block";
            btn.innerHTML = "✅<br><br>READY TO PASTE";

            // Fire native platform deep-link to trigger choice directory array directly
            setTimeout(() => {
                window.location.href = "whatsapp://";
            }, 800);

            // Re-set system button status indicators
            setTimeout(() => {
                btn.disabled = false;
                toast.style.display = "none";
                btn.innerHTML = "⚠️<br><br>TAP TO RUN<br>EMERGENCY ALERT";
            }, 4000);
        }
    </script>

</body>
</html>
