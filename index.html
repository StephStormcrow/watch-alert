<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* Dark theme to reduce night blindness */
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .panic-btn {
            background-color: #d32f2f; /* Clear Alert Red */
            color: white;
            border: none;
            width: 180px;
            height: 180px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Displays callsign dynamically from the NFC string -->
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <button class="panic-btn" onclick="sendEmergencyAlert()">⚠️<br>SEND<br>ASSISTANCE</button>
    </div>

    <script>
        // Extract parameter values directly out of URL string
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        
        // Show parsed callsign on visual interface
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function sendEmergencyAlert() {
            if (!navigator.geolocation) {
                alert("Error: Geolocation is disabled or unsupported.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://google.com{lat},${lon}`;
                    
                    // Fetch real-time localized Date/Time data matching SA conventions
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); // Formats as DD/MM/YYYY
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    // Personalised Emergency Format
                    const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    
                    // Encode into structural URL fragments and send to WhatsApp contact router
                    const textMessage = encodeURIComponent(rawMessage);
                    window.open(`https://wa.me{textMessage}`, '_blank');
                },
                (error) => {
                    if (error.code === error.PERMISSION_DENIED) {
                        alert("Please allow location access to dispatch coordinates.");
                    } else {
                        alert("GPS signal weak. Try again.");
                    }
                },
                {
                    enableHighAccuracy: true, // Pull data from active GPS hardware rather than towers
                    timeout: 7000
                }
            );
        }
    </script>

</body>
</html>
