<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        /* Massive, single-tap responsive layout element */
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            border: none;
            text-align: center;
            line-height: 1.4;
        }
        .panic-btn:active {
            background-color: #9a0007;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Native link element handles the entire sequence in 1 tap -->
        <a href="#" id="actionBtn" class="panic-btn" onclick="triggerGroupPanic(event)">⚠️<br><br>SEND<br>ASSISTANCE</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerGroupPanic(event) {
            const btn = document.getElementById('actionBtn');
            
            // Freeze navigation while browser queries device GPS chips
            event.preventDefault(); 

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            btn.innerHTML = "🔄<br><br>LOCKING GPS...";
            btn.style.pointerEvents = "none"; 

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // Standardize coordinate structures to 5 decimal points (~1 meter precision)
                    const lat = position.coords.latitude.toFixed(5);
                    const lon = position.coords.longitude.toFixed(5);
                    
                    // UNIVERSAL FORMAT: Guarantees clickable parsing on iOS and Android
                    const mapLink = "https://google.com" + lat + "," + lon;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); 
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    
                    // Update target destination to the official web endpoint router
                    btn.href = "https://wa.me/?text=" + encodeURIComponent(rawMessage);
                    
                    // Reset interface click parameters and execute the tap handoff natively
                    btn.style.pointerEvents = "auto";
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    
                    // Forces the browser to naturally switch tasks and pop open WhatsApp group choice list
                    btn.click(); 
                },
                (error) => {
                    btn.style.pointerEvents = "auto";
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    alert("GPS fail. Ensure location settings are active for your browser app.");
                },
                { enableHighAccuracy: true, timeout: 7000 }
            );
        }
    </script>

</body>
</html>
