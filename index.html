<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        /* Unified Style for Button and Native Link Trigger */
        .panic-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f; /* Red initially */
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            transition: all 0.3s ease;
            text-align: center;
            border: none;
        }
        /* Style adjustments when text message variables map is ready */
        .panic-link.ready {
            background-color: #25D366 !important; /* WhatsApp Green */
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8) !important;
        }
        .panic-link:disabled {
            background-color: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Standard Native Link Tag completely eliminates browser pop-up blocking -->
        <a href="#" id="actionBtn" class="panic-link" onclick="handleButtonClick(event)">⚠️<br><br>1. GET LOCATION</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        let currentStatus = "idle"; 

        function handleButtonClick(event) {
            const btn = document.getElementById('actionBtn');

            // STEP 1: Process Local GPS Data
            if (currentStatus === "idle") {
                // Prevent the link from navigating away while grabbing coordinates
                event.preventDefault(); 

                if (!navigator.geolocation) {
                    alert("Error: Geolocation is disabled or unsupported.");
                    return;
                }

                btn.style.pointerEvents = "none"; // Temporarily freeze click spamming
                btn.innerHTML = "🔄<br><br>LOCKING GPS...";

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const mapLink = `https://google.com{lat},${lon}`;
                        
                        const now = new Date();
                        const dateStr = now.toLocaleDateString('en-ZA'); 
                        const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                        const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                        const textMessage = encodeURIComponent(rawMessage);
                        
                        // Overwrite the actual underlying anchor link address natively
                        btn.href = `https://whatsapp.com{textMessage}`;
                        
                        // Transition layout cleanly to step 2
                        currentStatus = "ready";
                        btn.style.pointerEvents = "auto"; // Re-enable click execution
                        btn.classList.add('ready');
                        btn.innerHTML = "💬<br><br>2. SEND TO<br>WHATSAPP";
                    },
                    (error) => {
                        btn.style.pointerEvents = "auto";
                        btn.innerHTML = "⚠️<br><br>TRY AGAIN";
                        if (error.code === error.PERMISSION_DENIED) {
                            alert("Please allow location access permissions.");
                        } else {
                            alert("GPS link timed out.");
                        }
                    },
                    { enableHighAccuracy: true, timeout: 7000 }
                );
            } 
            // STEP 2: The browser allows this click event instantly since it maps to a direct URL update
            else if (currentStatus === "ready") {
                // Let the browser naturally open the updated href link properties
                
                // Optional: Reset button back to starting position after a short delay
                setTimeout(() => {
                    currentStatus = "idle";
                    btn.href = "#";
                    btn.classList.remove('ready');
                    btn.innerHTML = "⚠️<br><br>1. GET LOCATION";
                }, 4000);
            }
        }
    </script>

</body>
</html>
