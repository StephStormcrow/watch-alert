<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        .gps-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
        }
        .whatsapp-link {
            display: none;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <button id="gpsBtn" class="gps-btn" onclick="captureLocationData()">⚠️<br><br>1. GET LOCATION</button>
        <a id="waLink" class="whatsapp-link" href="#">💬<br><br>2. SEND TO<br>WHATSAPP</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function captureLocationData() {
            const gpsBtn = document.getElementById('gpsBtn');

            if (!navigator.geolocation) {
                alert("Error: Geolocation is unsupported.");
                return;
            }

            gpsBtn.disabled = true;
            gpsBtn.innerHTML = "🔄<br><br>LOCKING GPS...";

            navigator.geolocation.getCurrentPosition(
                (pos) => { handleCoordinates(pos.coords.latitude, pos.coords.longitude); },
                (err) => {
                    navigator.geolocation.getCurrentPosition(
                        (fallbackPos) => { handleCoordinates(fallbackPos.coords.latitude, fallbackPos.coords.longitude); },
                        (fallbackErr) => {
                            gpsBtn.disabled = false;
                            gpsBtn.innerHTML = "⚠️<br><br>1. GET LOCATION";
                            alert("Location Access Error. Please check permissions.");
                        },
                        { enableHighAccuracy: false, timeout: 5000 }
                    );
                },
                { enableHighAccuracy: true, timeout: 4000 }
            );
        }

        function handleCoordinates(lat, lon) {
            const gpsBtn = document.getElementById('gpsBtn');
            const waLink = document.getElementById('waLink');
            
            // SYSTEM COORDINATES OVERRIDE: Uses native coordinates mapping formatting to bypass text breaks
            const mapLink = `https://google.com{lat},${lon}`;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-ZA'); 
            const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

            // Placing the map link string on its own dedicated separate line preserves the text format rules
            const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}.\n\nLast known location:\n${mapLink}`;
            
            waLink.href = `whatsapp://send?text=${encodeURIComponent(rawMessage)}`;
            
            gpsBtn.style.display = "none";
            waLink.style.display = "inline-flex";
        }
    </script>

</body>
</html>
