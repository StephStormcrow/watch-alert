<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Patrol Alert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .callsign-display {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 30px;
        }
        /* Stylized link that looks and acts like a massive panic button */
        .panic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            width: 200px;
            height: 200px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
            border: none;
            text-align: center;
            line-height: 1.4;
        }
        .panic-btn:active {
            background-color: #9a0007;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="callsign-display" id="memberDisplay">Patrol Active</div>
        <!-- Single native web link element -->
        <a href="#" id="actionBtn" class="panic-btn" onclick="triggerGroupPanic(event)">⚠️<br><br>SEND<br>ASSISTANCE</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const callSign = urlParams.get('id') || "Unknown Patrol"; 
        document.getElementById('memberDisplay').innerText = `Logged: ${callSign}`;

        function triggerGroupPanic(event) {
            const btn = document.getElementById('actionBtn');
            
            // 1. Stop the link from firing until we have the GPS coordinates
            event.preventDefault(); 

            if (!navigator.geolocation) {
                alert("Error: Geolocation is disabled or unsupported.");
                return;
            }

            btn.innerHTML = "🔄<br><br>LOCKING GPS...";
            btn.style.pointerEvents = "none"; // Stop double-clicking

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Universal map link format
                    const mapLink = `https://google.com{lat},${lon}`;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-ZA'); 
                    const timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

                    const rawMessage = `Assistance required for ${callSign} on ${dateStr} at ${timeStr}. Last known location: ${mapLink}`;
                    const textMessage = encodeURIComponent(rawMessage);
                    
                    // 2. Set the destination to the official text-only sharing URL
                    btn.href = `https://wa.me{textMessage}`;
                    
                    // 3. Re-enable clicking and immediately force a native click event
                    btn.style.pointerEvents = "auto";
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    
                    // This forces the browser to open the newly created link naturally
                    btn.click(); 
                },
                (error) => {
                    btn.style.pointerEvents = "auto";
                    btn.innerHTML = "⚠️<br><br>SEND<br>ASSISTANCE";
                    alert("GPS Signal failed. Please ensure location services are enabled on your device.");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }
    </script>

</body>
</html>
